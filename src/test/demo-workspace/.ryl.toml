# Demo workspace for scripts/record-demo.sh. Only safe-fixable rules are
# enabled, so `ryl.fixAll` reflows the typed sample to a fully clean document.
[files]
yaml = ["*.yaml", "*.yml"]
markdown = ["*.md"]

[rules]
trailing-spaces = "enable"
new-line-at-end-of-file = "enable"
commas = "enable"

[rules.braces]
max-spaces-inside = 1

[rules.brackets]
max-spaces-inside = 1

[rules.quoted-strings]
quote-type = "double"
required = "only-when-needed"

[rules.comments]
require-starting-space = true

[rules.empty-lines]
max = 1

[rules.document-start]
present = true

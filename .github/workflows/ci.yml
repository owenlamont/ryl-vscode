name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      # The local `tsc` prek hook runs `npm run check-types`, so deps are needed.
      - run: npm ci
      # uv only installs prek here, so disable its cache (default is auto-on for
      # hosted runners, which warns about no lockfile); prek envs are cached below.
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v6
        with:
          enable-cache: false
      - name: Cache prek hook environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('prek.toml') }}
          restore-keys: prek-${{ runner.os }}-
      - name: Install prek
        run: uv tool install prek
      - name: Run prek (Biome, tsc, ryl, rumdl, typos, zizmor)
        env:
          SKIP: no-commit-to-branch # branch-protection hook is irrelevant in CI
        run: prek run --all-files

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Download ryl binary
        run: npm run download-ryl
      - name: End-to-end tests
        run: xvfb-run -a npm test
      - name: Validate packaging
        run: npx vsce ls

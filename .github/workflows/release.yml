name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # VS Code platform targets. ryl ships musl builds, so Linux and Alpine
        # share a binary; armhf uses the gnueabihf build. The download script
        # extracts each (tar for *nix, unzip for the Windows .zip) on Linux.
        target:
          - win32-x64
          - win32-arm64
          - darwin-arm64
          - linux-x64
          - linux-arm64
          - linux-armhf
          - alpine-x64
          - alpine-arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - name: Download ryl for ${{ matrix.target }}
        run: node scripts/download-ryl.mjs --target "$TARGET"
        env:
          TARGET: ${{ matrix.target }}
      - name: Package VSIX
        run: npx vsce package --target "$TARGET" -o "dist/ryl-$TARGET.vsix"
        env:
          TARGET: ${{ matrix.target }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix-${{ matrix.target }}
          path: dist/*.vsix
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: vsix-*
          merge-multiple: true
      - name: List packaged VSIX
        run: ls -l dist
      - name: Publish to the VS Marketplace
        run: npx vsce publish --packagePath dist/*.vsix --skip-duplicate
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        if: ${{ always() }}
        run: npx ovsx publish --packagePath dist/*.vsix --skip-duplicate
        env:
          OVSX_PAT: ${{ secrets.OVSX_TOKEN }}
      - name: Create GitHub release
        if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
        # Idempotent: a rerun (after a transient publish failure) uploads to the
        # existing release instead of failing because the tag release exists.
        run: |-
          gh release create "$GITHUB_REF_NAME" dist/*.vsix --title "$GITHUB_REF_NAME" --generate-notes \
            || gh release upload "$GITHUB_REF_NAME" dist/*.vsix --clobber
        env:
          GH_TOKEN: ${{ github.token }}

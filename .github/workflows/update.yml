name: Update Linters
on:
  schedule:
    - cron: "0 10 * * 5" # Friday 18:00 UTC+8
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh-linters:
    runs-on: ubuntu-latest
    environment: automation
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # uv only installs prek here, so disable its cache (default is auto-on for
      # hosted runners, which warns about no lockfile to key on).
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v6
        with:
          enable-cache: false
      - name: Install prek
        run: uv tool install prek
      # npm dependencies are handled by Dependabot; this refreshes the prek hook
      # revisions (Biome, ryl, rumdl, typos, zizmor, pre-commit-hooks).
      - name: Run prek autoupdate
        run: prek autoupdate --cooldown-days 7
      # prek autoupdate bumps the biomejs/pre-commit hook rev (the source of
      # truth for the Biome version); keep biome.json's $schema locked to it so
      # the config schema never lags the linter.
      - name: Sync biome.json $schema to the biome pre-commit hook rev
        run: |-
          set -euo pipefail
          hook_block=$(grep -A2 'biomejs/pre-commit' prek.toml || true)
          if [ -z "$hook_block" ]; then
            echo "biomejs/pre-commit hook not found in prek.toml; skipping schema sync."
            exit 0
          fi
          rev=$(printf '%s\n' "$hook_block" | sed -nE 's/^[[:space:]]*rev = "v?([0-9]+\.[0-9]+\.[0-9]+)"[[:space:]]*$/\1/p')
          if [ -z "$rev" ]; then
            echo "::error::biomejs/pre-commit hook present but its rev is not a plain stable vX.Y.Z tag; refusing to leave biome.json \$schema out of sync. Update the sync step in update.yml." >&2
            exit 1
          fi
          sed -i -E "s#(biomejs\.dev/schemas/)[0-9.]+#\1${rev}#" biome.json
          echo "Synced biome.json \$schema to ${rev}."
      - name: Check for changes
        id: diff
        run: |-
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate token
        if: steps.diff.outputs.changed == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2
        id: token
        with:
          app-id: ${{ secrets.AUTH_APP_CLIENT_ID }}
          private-key: ${{ secrets.AUTH_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - name: Create PR with refreshed linters
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v7
        with:
          token: ${{ steps.token.outputs.token }}
          commit-message: "chore: refresh linters"
          title: "chore: refresh linters"
          body: |-
            Automated linter refresh: ran `prek autoupdate --cooldown-days 7` and
            synced `biome.json`'s `$schema` to the `biomejs/pre-commit` hook rev.
          branch: bot/update-linters
          author: GitHub Actions <actions@github.com>
          delete-branch: true
